<nav
  aria-label="Pagination"
  class="flex flex-wrap items-center justify-center gap-2"
>
  <button
    mat-stroked-button
    type="button"
    class="btn-ghost btn-ghost--pill inline-flex h-10 items-center px-4 shadow-sm transition disabled:opacity-40"
    [disabled]="!hasPrev()"
    (click)="onPage(page() - 1)"
  >
    ← {{ settings.t('previous') }}
  </button>

  <!-- Mobile: compact "X / Y" counter. Avoids 7 buttons wrapping to 3 rows. -->
  <span
    aria-live="polite"
    class="px-3 text-sm font-medium tabular-nums text-slate-600 sm:hidden"
  >
    {{ page() + 1 }} / {{ totalPages() }}
  </span>

  <!-- sm and up: full numbered buttons. display:contents makes the wrapper
       transparent to the parent flex so buttons flow inline. -->
  <div class="hidden sm:contents">
    @for (n of pageNumbers(); track n) {
      @if (n === page()) {
        <button
          mat-flat-button
          type="button"
          class="btn-action btn-action--pill h-10 min-w-10 px-3 shadow-md transition"
          aria-current="page"
          (click)="onPage(n)"
        >
          {{ n + 1 }}
        </button>
      } @else {
        <button
          mat-stroked-button
          type="button"
          class="btn-ghost btn-ghost--pill h-10 min-w-10 px-3 transition"
          (click)="onPage(n)"
        >
          {{ n + 1 }}
        </button>
      }
    }
  </div>

  <button
    mat-stroked-button
    type="button"
    class="btn-ghost btn-ghost--pill inline-flex h-10 items-center px-4 shadow-sm transition disabled:opacity-40"
    [disabled]="!hasNext()"
    (click)="onPage(page() + 1)"
  >
    {{ settings.t('next') }} →
  </button>
</nav>
