<article
  class="flex h-full flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-md transition hover:shadow-lg md:min-h-[18rem] md:flex-row"
>
  <div
    class="relative h-64 w-full flex-none overflow-hidden bg-slate-100 md:h-auto md:w-[42%]"
  >
    <img
      [src]="product().images.card || fallbackImage"
      [srcset]="cardSrcset()"
      sizes="(min-width: 768px) 42vw, 100vw"
      [alt]="product().name | localizedName"
      class="absolute inset-0 h-full w-full object-cover object-center"
      width="400"
      height="300"
      loading="lazy"
      decoding="async"
      (error)="onImageError($event)"
    />
  </div>

  <div class="flex flex-1 flex-col gap-4 p-5">
    <div class="flex items-start justify-between gap-3">
      <h3 class="line-clamp-2 text-lg font-medium text-slate-800">
        {{ product().name | localizedName }}
      </h3>
    </div>

    <p class="text-sm text-slate-500">
      {{ pricePerUnitCzk() | price }} / {{ product().unit | unit }}
    </p>

    <p class="text-xl font-medium text-slate-800">
      {{ lineTotalCzk() | price }}
    </p>

    <div class="mt-auto flex flex-col gap-4">
      <div
        class="inline-flex w-fit items-center rounded-full border border-slate-300 bg-white p-1 text-sm font-medium text-slate-700 shadow-sm"
      >
        <button
          type="button"
          class="flex h-8 w-8 items-center justify-center rounded-full text-slate-600 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-30 disabled:hover:bg-transparent"
          [disabled]="selectedAmount() <= 0"
          (click)="decrement()"
          [attr.aria-label]="'decreaseAmount' | translate"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.25"
            stroke-linecap="round"
            class="h-4 w-4"
            aria-hidden="true"
          >
            <path d="M5 12h14" />
          </svg>
        </button>

        <input
          type="number"
          min="0"
          [step]="step()"
          [ngModel]="selectedAmount()"
          (ngModelChange)="onAmountChange($event)"
          class="w-12 bg-transparent text-center tabular-nums outline-none [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none"
          [attr.aria-label]="'amount' | translate"
        />

        <span class="pr-2 text-slate-500">{{ product().unit | unit }}</span>

        <button
          type="button"
          class="flex h-8 w-8 items-center justify-center rounded-full text-slate-600 transition hover:bg-slate-100"
          (click)="increment()"
          [attr.aria-label]="'increaseAmount' | translate"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.25"
            stroke-linecap="round"
            class="h-4 w-4"
            aria-hidden="true"
          >
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </div>

      <button
        mat-flat-button
        type="button"
        class="btn-action btn-action--cta w-full rounded px-8 py-2 transition hover:shadow-lg disabled:opacity-50 sm:w-auto sm:min-w-56"
        [disabled]="selectedAmount() <= 0"
        (click)="addToCart.emit(selectedAmount())"
      >
        {{ 'addToBasket' | translate }}
      </button>
    </div>
  </div>
</article>
