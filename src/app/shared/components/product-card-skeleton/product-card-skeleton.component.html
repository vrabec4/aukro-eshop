<article
  aria-busy="true"
  aria-hidden="true"
  class="flex h-full animate-pulse flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-md md:min-h-[18rem] md:flex-row"
>
  <!-- Mirrors the real card's image area (h-64 mobile, 42% md+) -->
  <div class="h-64 w-full flex-none bg-slate-100 md:h-auto md:w-[42%]"></div>

  <div class="flex flex-1 flex-col gap-4 p-5">
    <!-- Title: two lines of varying width -->
    <div class="space-y-2">
      <div class="h-5 w-3/4 rounded bg-slate-200"></div>
      <div class="h-5 w-1/2 rounded bg-slate-200"></div>
    </div>

    <!-- Price-per-unit -->
    <div class="h-3 w-24 rounded bg-slate-200"></div>

    <!-- Line total -->
    <div class="h-6 w-32 rounded bg-slate-200"></div>

    <div class="mt-auto flex flex-col gap-4">
      <!-- Amount input placeholder -->
      <div class="h-8 w-24 rounded border border-slate-200 bg-slate-50"></div>

      <!-- CTA placeholder -->
      <div class="h-10 w-full rounded bg-slate-200 sm:w-56"></div>
    </div>
  </div>
</article>
